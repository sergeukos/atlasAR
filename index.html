<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рельеф Ковылкинского района (AR)</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; font-family: sans-serif; }
        model-viewer { width: 100%; height: 100vh; --poster-color: #f0f0f0; }
        
        /* Стилизация кнопки AR */
        .ar-button {
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
        }

        /* Скрываем кнопку, если устройство вообще не поддерживает AR */
        #ar-button:not([slot="ar-button"]) {
            display: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="model.glb" 
        ios-src="model.usdz" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        ar-placement="floor"
        shadow-intensity="1.5" 
        shadow-softness="1"
        environment-image="neutral"
        exposure="1"
        auto-rotate
        touch-action="pan-y">
        
        <button slot="ar-button" class="ar-button" id="ar-button">
            📍 Поставить рельеф на стол (AR)
        </button>

        <div slot="poster" style="display: flex; justify-content: center; align-items: center; height: 100%;">
            <p>Загрузка 3D-рельефа...</p>
        </div>
    </model-viewer>

</body>
</html>
